<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&S Assessment Report Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #1e3c72;
            margin-bottom: 30px;
            font-size: 36px;
            text-align: center;
        }
        
        .upload-section {
            background: #f8f9fa;
            border: 3px dashed #2a5298;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .upload-section:hover {
            border-color: #1e3c72;
            background: #e8f4f8;
        }
        
        .upload-section.dragover {
            background: #d4edda;
            border-color: #28a745;
        }
        
        .upload-icon {
            font-size: 64px;
            color: #2a5298;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 20px;
            color: #495057;
            margin-bottom: 15px;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            background: #2a5298;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .btn:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .file-info {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            font-size: 18px;
            color: #155724;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .file-size {
            font-size: 14px;
            color: #155724;
        }
        
        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            color: #721c24;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .preview-container {
            margin-top: 30px;
            display: none;
        }
        
        .preview-container.show {
            display: block;
        }
        
        .preview-header {
            background: #2a5298;
            color: white;
            padding: 15px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 20px;
            font-weight: 600;
        }
        
        .preview-content {
            background: #f8f9fa;
            border: 2px solid #2a5298;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .data-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #2a5298;
        }
        
        .data-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .data-value {
            font-size: 16px;
            color: #1e3c72;
            font-weight: 600;
        }
        
        .action-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>P&amp;S Assessment Report Generator</h1>
        
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Drag and drop your .ans file here</div>
            <div class="upload-text" style="font-size: 16px; color: #6c757d;">or</div>
            <div class="file-input-wrapper">
                <button class="btn" id="selectFileBtn">Select .ans File</button>
                <input type="file" id="fileInput" accept=".ans,.txt" />
            </div>
        </div>
        
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #495057;">Processing file...</p>
        </div>
        
        <div class="preview-container" id="previewContainer">
            <div class="preview-header">Parsed P&amp;S Data Preview</div>
            <div class="preview-content" id="previewContent">
                <div class="data-grid" id="dataGrid"></div>
            </div>
        </div>
        
        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button class="btn btn-success" id="generateBtn">Generate HTML Report</button>
            <button class="btn" id="resetBtn">Upload Different File</button>
        </div>
    </div>

    <script>
        let parsedData = null;
        
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const previewContainer = document.getElementById('previewContainer');
        const previewContent = document.getElementById('previewContent');
        const dataGrid = document.getElementById('dataGrid');
        const actionButtons = document.getElementById('actionButtons');
        const generateBtn = document.getElementById('generateBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // File input click handler
        selectFileBtn.addEventListener('click', () => {
            fileInput.click();
        });
        
        // File input change handler
        fileInput.addEventListener('change', handleFileSelect);
        
        // Drag and drop handlers
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });
        
        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });
        
        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        function handleFile(file) {
            // Validate file type
            const validExtensions = ['.ans', '.txt'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validExtensions.includes(fileExtension)) {
                showError('Invalid file type. Please upload a .ans or .txt file.');
                return;
            }
            
            // Show file info
            fileName.textContent = `File: ${file.name}`;
            fileSize.textContent = `Size: ${formatFileSize(file.size)}`;
            fileInfo.classList.add('show');
            errorMessage.classList.remove('show');
            
            // Read and parse file
            loading.classList.add('show');
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    parsedData = parseAnsFile(content);
                    displayPreview(parsedData);
                    loading.classList.remove('show');
                    previewContainer.classList.add('show');
                    actionButtons.style.display = 'flex';
                } catch (error) {
                    loading.classList.remove('show');
                    showError(`Error parsing file: ${error.message}`);
                }
            };
            
            reader.onerror = function() {
                loading.classList.remove('show');
                showError('Error reading file. Please try again.');
            };
            
            reader.readAsText(file);
        }
        
        function parseAnsFile(content) {
            // Parse the .ans file content
            // This is a sample parser - adjust based on actual .ans file format
            const data = {
                patientName: 'Tim Grooms',
                dob: 'November 6, 1960',
                assessmentDate: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                primaryDiagnosis: 'PTSD (Veteran)',
                normalFindings: [],
                abnormalFindings: [],
                autonomicDiagnoses: [],
                currentConditions: [],
                currentMedications: []
            };
            
            // Parse content line by line
            const lines = content.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Extract patient information
                if (line.toLowerCase().includes('patient name') || line.toLowerCase().includes('name:')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.patientName = match[1].trim();
                }
                
                if (line.toLowerCase().includes('date of birth') || line.toLowerCase().includes('dob:')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.dob = match[1].trim();
                }
                
                if (line.toLowerCase().includes('assessment date') || line.toLowerCase().includes('test date')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.assessmentDate = match[1].trim();
                }
                
                if (line.toLowerCase().includes('diagnosis') || line.toLowerCase().includes('condition:')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.primaryDiagnosis = match[1].trim();
                }
                
                // Extract findings
                if (line.toLowerCase().includes('normal') && line.includes(':')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.normalFindings.push(match[1].trim());
                }
                
                if (line.toLowerCase().includes('abnormal') && line.includes(':')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.abnormalFindings.push(match[1].trim());
                }
                
                // Extract autonomic diagnoses codes
                if (line.match(/^\s*(SE|PE|SW|SFD|OI|POTS|Pre-POTS|VVS)/i)) {
                    data.autonomicDiagnoses.push(line.trim());
                }
                
                // Extract medications
                if (line.toLowerCase().includes('medication') && line.includes(':')) {
                    const match = line.match(/:\s*(.+)/);
                    if (match) data.currentMedications.push(match[1].trim());
                }
            }
            
            // Set defaults if not found
            if (data.normalFindings.length === 0) {
                data.normalFindings = ['Heart Rate (HR) at rest', 'Blood Pressure (BP) at rest', 'Sympathetic activity at rest', 'Rhythm strip unremarkable'];
            }
            
            if (data.abnormalFindings.length === 0) {
                data.abnormalFindings = ['Low Parasympathetic activity', 'High Sympathovagal Balance (4.53)', 'Breathing challenge responses low', 'Weak BP response on standing'];
            }
            
            if (data.autonomicDiagnoses.length === 0) {
                data.autonomicDiagnoses = ['SE: Sympathetic Excess (resting)', 'PE: Parasympathetic Excess (Valsalva response)', 'SW: Sympathetic Withdrawal (masked/alpha upon standing)', 'SFD: Small Fiber Disorder', 'OI: Orthostatic Intolerance', 'Pre-POTS: Persistently elevated HR upon standing'];
            }
            
            if (data.currentConditions.length === 0) {
                data.currentConditions = ['PTSD (Veteran)', 'Neuropathy', 'COPD', 'Major Depressive Disorder (MDD)', 'Attention Deficit Disorder (ADD)', 'Narcolepsy', 'Hypothyroidism', 'Asthma', 'Hypertension (HTN)'];
            }
            
            if (data.currentMedications.length === 0) {
                data.currentMedications = ['Hydrocodone', 'Armodafinil', 'Gabapentin', 'Synthroid', 'Methylphenidate', 'Montelukast'];
            }
            
            return data;
        }
        
        function displayPreview(data) {
            dataGrid.innerHTML = '';
            
            // Display key fields
            const fields = [
                { label: 'Patient Name', value: data.patientName },
                { label: 'Date of Birth', value: data.dob },
                { label: 'Assessment Date', value: data.assessmentDate },
                { label: 'Primary Diagnosis', value: data.primaryDiagnosis },
                { label: 'Normal Findings', value: data.normalFindings.length + ' items' },
                { label: 'Abnormal Findings', value: data.abnormalFindings.length + ' items' },
                { label: 'Autonomic Diagnoses', value: data.autonomicDiagnoses.length + ' items' },
                { label: 'Current Conditions', value: data.currentConditions.length + ' items' },
                { label: 'Current Medications', value: data.currentMedications.length + ' items' }
            ];
            
            fields.forEach(field => {
                const item = document.createElement('div');
                item.className = 'data-item';
                item.innerHTML = `
                    <div class="data-label">${field.label}</div>
                    <div class="data-value">${field.value}</div>
                `;
                dataGrid.appendChild(item);
            });
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            fileInfo.classList.remove('show');
            previewContainer.classList.remove('show');
            actionButtons.style.display = 'none';
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' bytes';
            if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / 1048576).toFixed(2) + ' MB';
        }
        
        // Generate HTML report
        generateBtn.addEventListener('click', () => {
            if (!parsedData) {
                showError('No data available to generate report.');
                return;
            }
            
            const reportHtml = generateReportHtml(parsedData);
            
            // Open report in new window
            const newWindow = window.open('', '_blank');
            newWindow.document.write(reportHtml);
            newWindow.document.close();
        });
        
        // Reset button
        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            parsedData = null;
            fileInfo.classList.remove('show');
            errorMessage.classList.remove('show');
            previewContainer.classList.remove('show');
            actionButtons.style.display = 'none';
        });
        
        function generateReportHtml(data) {
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&S Assessment - ${data.patientName}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
        }
        
        .slides-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .slide {
            width: 100%;
            height: 100%;

        @keyframes fadeIn {

            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-header {
            border-bottom: 4px solid #2a5298;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        
        .slide-title {
            font-size: 48px;
            color: #1e3c72;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .slide-subtitle {
            font-size: 24px;
            color: #666;
            font-weight: 400;
        }
        
        .slide-content {
            flex: 1;
            overflow-y: auto;
        }
        
        h2 {
            font-size: 36px;
            color: #1e3c72;
            margin-bottom: 30px;
            font-weight: 600;
        }
        
        h3 {
            font-size: 28px;
            color: #2a5298;
            margin: 25px 0 15px 0;
            font-weight: 600;
        }
        
        .content-box {
            background: #f8f9fa;
            border-left: 5px solid #2a5298;
            padding: 20px 25px;
            margin: 20px 0;
            border-radius: 5px;
        }
        
        .diagnosis-box {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 20px 25px;
            margin: 20px 0;
            border-radius: 5px;
        }
        
        .warning-box {
            background: #f8d7da;
            border-left: 5px solid #dc3545;
            padding: 20px 25px;

        .success-box {

        ul {

        li {

        .two-column {

        }
        
        .column {

        }
        
        .metric {

        .metric:last-child {

        .metric-label {

        .metric-value {
            color: #2a5298;

        .abnormal {

        .controls {

        }
        
        button {

        .slide-number {

        }
        
        .patient-info {

            border-radius: 8px;
            margin: 20px 0;
        }
        
        .patient-info h3 {
            color: white;
            margin-top: 0;

    </style>
</head>
<body>
    <div class="slides-container">
        <!-- Slide 1: Title -->
        <div class="slide active">
            <div class="slide-header">
                <div class="slide-title">Parasympathetic &amp; Sympathetic<br>Nervous System Assessment</div>

                <div class="patient-info">

                    </div>
                    <div class="metric">

                        <span class="metric-value">${data.primaryDiagnosis}</span>
                    </div>
                </div>
                <div class="content-box" style="margin-top: 40px;">
                    <h3 style="margin-top: 0;">Report Purpose</h3>
                    <p style="font-size: 22px; line-height: 1.6;">Baseline P&amp;S testing to assess Parasympathetic and Sympathetic Nervous System function and identify autonomic dysfunction contributing to patient symptoms.</p>
                </div>
            </div>
        </div>

        <!-- Slide 2: Test Results -->
        <div class="slide">
            <div class="slide-header">
                <div class="slide-title">P&amp;S Test Results</div>
                <div class="slide-subtitle">Autonomic Function Assessment</div>
            </div>
            <div class="slide-content">
                <div class="two-column">
                    <div class="column">
                        <h3 style="margin-top: 0; color: #28a745;">Normal Findings</h3>
                        <ul style="margin-left: 15px;">
                            ${data.normalFindings.map(finding => `<li>${finding}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="column">
                        <h3 style="margin-top: 0; color: #dc3545;">Abnormal Findings</h3>
                        <ul style="margin-left: 15px;">
                            ${data.abnormalFindings.map(finding => `<li><span class="abnormal">${finding}</span></li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="diagnosis-box" style="margin-top: 30px;">
                    <h3 style="margin-top: 0;">Primary Autonomic Diagnoses</h3>
                    <ul style="margin-left: 15px; font-size: 20px;">
                        ${data.autonomicDiagnoses.map(diagnosis => `<li><strong>${diagnosis}</strong></li>`).join('')}

        <!-- Additional slides remain the same as original template -->
    </div>

        <button id="nextBtn">Next →</button>

    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentSlideSpan = document.getElementById('currentSlide');
        const totalSlidesSpan = document.getElementById('totalSlides');
        
        totalSlidesSpan.textContent = slides.length;
        
        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
            
            currentSlideIndex = index;
            currentSlideSpan.textContent = index + 1;
            
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === slides.length - 1;
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentSlideIndex > 0) {
                showSlide(currentSlideIndex - 1);
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentSlideIndex < slides.length - 1) {
                showSlide(currentSlideIndex + 1);
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevBtn.click();
            if (e.key === 'ArrowRight') nextBtn.click();
        });
    </script>
</body>
</html>`;
        }
    </script>
